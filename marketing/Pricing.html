<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ræson — pricing</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:ital,wght@0,300..800;1,300..800&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --font-display: 'Instrument Sans', 'Host Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-sans: 'Host Grotesk', 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-serif: 'Instrument Sans', sans-serif;
    --font-serif-italic: 'Instrument Sans', sans-serif;
    --font-italic: 'Instrument Sans', sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: var(--font-sans); }
  body { -webkit-font-smoothing: antialiased; }
  em { font-family: var(--font-italic); font-style: italic; font-weight: 400; }
  a { color: inherit; }
  ::selection { background: #009767; color: #0A0A0A; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/framer-motion@11.18.2/dist/framer-motion.js"></script>
<script>window.Motion = window.FramerMotion || window.Motion;</script>
<script type="text/babel" src="components/shared.jsx"></script>
<script type="text/babel" src="components/home-sections.jsx"></script>
<script type="text/babel" src="components/pages.jsx"></script>
<script type="text/babel">
function Page() {
  const { tweaks, setTweaks, editMode, C } = useTweaks();
  React.useEffect(() => {
    document.body.style.background = C.bg;
    document.body.style.color = C.text;
  }, [C]);
  return (
    <div style={{ background: C.bg, color: C.text, minHeight: '100vh', position: 'relative' }} data-screen-label="pricing">
      <Grain enabled={tweaks.grain} isDark={C.isDark} />
      <Nav C={C} current="pricing" />
      <PricingPage C={C} />
      <Footer C={C} />
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} C={C} visible={editMode} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>
</body>
</html>
